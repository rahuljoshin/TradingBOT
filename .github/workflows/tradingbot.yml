name: botRunner

on:
  schedule:
    # This cron expression means "every 5th minute"
    #- cron: '*/6 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

# This section is critical to fix the 403 error
permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas_ta ta

      - name: Execute Python script
        run: python tradingbot.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "github-actions[tradingbot]"
          git config --global user.email "github-actions[tradingbot]@users.noreply.github.com"
          
          # Stage all CSV files
          git add *.csv
          
          # Only commit and push if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market data CSV: $(date)"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: botRunner

on:
  schedule:
    # This cron expression means "every 5th minute"
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # This speeds up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas_ta ta

      - name: Execute Python script
        run: python tradingbot.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "github-actions[tradingbot]"
          git config --global user.email "github-actions[tradingbot]@users.noreply.github.com"
          git add *.csv
          # Only commit if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || git commit -m "Update data CSV"
          git push


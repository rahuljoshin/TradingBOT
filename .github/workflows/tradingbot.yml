name: botRunner

on:
 workflow_dispatch:
    inputs:
      index:
        description: 'Select the Index to trade'
        required: true
        default: 'NIFTY'
        type: choice
        options:
          - NIFTY
          - BANKNIFTY
          - SENSEX

# This section is critical to fix the 403 error
permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas_ta ta

      - name: Execute Python script
        run: python tradingbot.py --index ${{ github.event.inputs.index }}


        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

